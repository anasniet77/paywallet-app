<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Bank Accounts - PayWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f172a;
            --accent: #0284c7; 
            --accent-deep: #0369a1;
            --accent-tint: #f0f9ff;
            --muted: #7c8794;
            --rule: #e7ebee;
        }

        * { box-sizing: border-box; }
        body { background: #ffffff; font-family: 'Inter', sans-serif; color: var(--ink); min-height: 100vh; }
        .page-wrap { max-width: 460px; margin: 0 auto; padding: 72px 24px 60px; }

        .back-link {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; color: var(--muted);
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 36px; transition: color 0.2s ease;
        }
        .back-link:hover { color: var(--accent-deep); }

        .card-modern {
            background: #ffffff; border-radius: 20px; padding: 40px 36px 36px;
            box-shadow: 0 1px 3px rgba(15,23,42,0.05), 0 24px 56px -20px rgba(15,23,42,0.14);
            position: relative; overflow: hidden;
        }
        .card-modern::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--accent) 0%, #38bdf8 60%, var(--accent) 100%);
        }

        .eyebrow { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent-deep); margin-bottom: 6px; }
        h2.title { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 1.6rem; color: var(--ink); margin-bottom: 24px; letter-spacing: -0.02em; }

        .bank-card {
            display: flex; align-items: center; gap: 16px; background: #fbfcfd; border: 1px solid var(--rule);
            border-radius: 16px; padding: 16px; margin-bottom: 12px; transition: all 0.2s ease;
        }
        .bank-card:hover { border-color: #cdd6dc; background: #fff; box-shadow: 0 4px 12px rgba(15,23,42,0.03); }
        
        .bank-avatar {
            flex: none; width: 44px; height: 44px; border-radius: 12px; background: var(--accent-tint);
            color: var(--accent-deep); display: flex; align-items: center; justify-content: center;
            font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 1rem;
        }
        
        .bank-info { flex: 1; min-width: 0; }
        .bank-name { font-size: 0.95rem; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
        .bank-details { font-size: 0.8rem; color: var(--muted); font-family: 'Inter', monospace; }

        .btn-confirm {
            width: 100%; background: #f8fafc; color: var(--ink); border: 1px dashed #cbd5e1; border-radius: 12px;
            padding: 15px; font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 0.92rem;
            margin-top: 20px; transition: all 0.2s ease; display: block; text-align: center; text-decoration: none;
        }
        .btn-confirm:hover { background: var(--accent-tint); border-color: var(--accent); color: var(--accent-deep); }
        
        .empty-state { text-align: center; padding: 20px 0; }
        .empty-state svg { width: 48px; height: 48px; color: #cbd5e1; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="page-wrap">
        <a href="/dashboard" class="back-link">&larr; BACK TO DASHBOARD</a>

        <div class="card-modern">
            <div class="eyebrow">Wallet &middot; Setup</div>
            <h2 class="title">My Bank Accounts</h2>

            <!-- If user has linked banks -->
            <div th:if="${!linkedBanks.isEmpty()}">
                <div th:each="bank : ${linkedBanks}" class="bank-card">
                    <div class="bank-avatar" th:text="${#strings.substring(bank.bankName, 0, 2).toUpperCase()}">SB</div>
                    <div class="bank-info">
                        <div class="bank-name" th:text="${bank.bankName}">State Bank of India</div>
                        <div class="bank-details" th:text="'•••• ' + ${#strings.substring(bank.accountNumber, #strings.length(bank.accountNumber)-4)} + ' | ' + ${bank.ifscCode}">•••• 1234 | SBIN0001234</div>
                    </div>
                </div>
            </div>

            <!-- If user has NO linked banks -->
            <div th:if="${linkedBanks.isEmpty()}" class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z"/>
                </svg>
                <p class="text-muted small fw-medium">You haven't linked any bank accounts yet.</p>
            </div>

            <!-- Button to link a new bank (points to your existing form) -->
            <a href="/dashboard/link-bank" class="btn-confirm">+ Link New Bank Account</a>
        </div>
    </div>
</body>
</html>
