<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Passbook History - PayWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0f2a1f;
            --paper: #ffffff;
            --rule: #e6e9e7;
            --emerald: #0f7a4c;
            --emerald-deep: #0b5c3a;
            --muted: #7c877f;
            --danger: #d93025;
        }

        * { box-sizing: border-box; }
        body { background: var(--paper); font-family: 'Inter', sans-serif; color: var(--ink); min-height: 100vh; }
        .page-wrap { max-width: 460px; margin: 0 auto; padding: 72px 24px 60px; }

        .back-link {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; color: var(--muted);
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 36px; transition: color 0.2s ease;
            text-transform: uppercase;
        }
        .back-link:hover { color: var(--emerald-deep); }

        .card-ledger {
            background: var(--paper); border-radius: 20px; padding: 40px 36px 36px;
            box-shadow: 0 1px 3px rgba(15,42,31,0.05), 0 24px 56px -20px rgba(15,42,31,0.14);
            position: relative; overflow: hidden;
        }
        .card-ledger::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--emerald) 0%, #4fa87f 60%, var(--emerald) 100%);
        }

        .eyebrow { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--emerald-deep); margin-bottom: 6px; }
        h2.title { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 1.6rem; color: var(--ink); margin-bottom: 24px; letter-spacing: -0.02em; }

        .tx-card {
            display: flex; align-items: flex-start; justify-content: space-between;
            padding: 20px 0; border-bottom: 1px solid var(--rule);
        }
        .tx-card:last-child { border-bottom: none; padding-bottom: 0; }
        
        .tx-info { display: flex; align-items: flex-start; gap: 14px; }
        .tx-avatar {
            flex: none; width: 42px; height: 42px; border-radius: 12px; background: #f4f7f5;
            display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; color: var(--emerald-deep);
        }
        
        .tx-details { display: flex; flex-direction: column; gap: 3px; }
        .tx-type { font-size: 0.95rem; font-weight: 700; color: var(--ink); font-family: 'Manrope', sans-serif; }
        .tx-date { font-size: 0.75rem; color: var(--muted); }
        .tx-ref { font-size: 0.65rem; color: var(--muted); font-family: monospace; background: #f4f7f5; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px;}

        .tx-amount { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 1.05rem; }
        .amount-in { color: var(--emerald); }
        .amount-out { color: var(--ink); }

        .empty-state { text-align: center; padding: 40px 0 20px; }
        .empty-state svg { width: 48px; height: 48px; color: #d3d9d5; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="page-wrap">
        <a href="/dashboard" class="back-link">&larr; BACK</a>

        <div class="card-ledger">
            <div class="eyebrow">Records</div>
            <h2 class="title">Passbook</h2>

            <!-- Displays when the user has transactions -->
            <div th:if="${!transactions.isEmpty()}">
                <div th:each="tx : ${transactions}" class="tx-card">
                    <div class="tx-info">
                        <div class="tx-avatar">
                            <!-- Show Down Arrow for receive/deposit, Up Arrow for send -->
                            <span th:if="${tx.receiverPhone == user.phoneNumber}">↓</span>
                            <span th:if="${tx.senderPhone == user.phoneNumber && tx.status != 'BANK_DEPOSIT'}">↑</span>
                        </div>
                        <div class="tx-details">
                            
                            <!-- Smart Title Logic -->
                            <span class="tx-type" th:if="${tx.status == 'BANK_DEPOSIT'}">Wallet Top-up</span>
                            <span class="tx-type" th:if="${tx.status != 'BANK_DEPOSIT' && tx.senderPhone == user.phoneNumber}" th:text="'Sent to ' + ${tx.receiverPhone}">Sent Money</span>
                            <span class="tx-type" th:if="${tx.status != 'BANK_DEPOSIT' && tx.receiverPhone == user.phoneNumber}" th:text="'From ' + ${tx.senderPhone}">Received Money</span>
                            
                            <span class="tx-date" th:text="${#temporals.format(tx.timestamp, 'dd MMM yyyy, hh:mm a')}">12 Oct 2026, 02:30 PM</span>
                            
                            <!-- Shows the Razorpay ID ONLY if it exists -->
                            <span class="tx-ref" th:if="${tx.referenceId != null}" th:text="'Ref: ' + ${tx.referenceId}">Ref: pay_XXXX</span>
                        
                        </div>
                    </div>
                    
                    <!-- Smart Amount Color Logic -->
                    <div class="tx-amount" 
                         th:classappend="${tx.receiverPhone == user.phoneNumber ? 'amount-in' : 'amount-out'}"
                         th:text="${tx.receiverPhone == user.phoneNumber ? '+' : '-'} + '₹' + ${tx.amount}">
                        +₹500
                    </div>
                </div>
            </div>

            <!-- Displays when the user has NO transactions -->
            <div th:if="${transactions.isEmpty()}" class="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <p class="text-muted small fw-medium">No transactions yet.</p>
            </div>
        </div>
    </div>
</body>
</html>
