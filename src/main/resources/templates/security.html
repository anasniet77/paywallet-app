<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Security & PIN - PayWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ink: #0f2a1f;
            --paper: #ffffff;
            --rule: #e6e9e7;
            --emerald: #0f7a4c;
            --emerald-deep: #0b5c3a;
            --emerald-tint: #eaf5ef;
            --muted: #7c877f;
            --danger: #d93025;
        }

        * { box-sizing: border-box; }

        body {
            background: #f8faf9;
            font-family: 'Inter', sans-serif;
            color: var(--ink);
            min-height: 100vh;
        }

        /* --- Custom Navbar & Sidebar --- */
        .navbar-custom {
            background: var(--paper);
            border-bottom: 1px solid var(--rule);
            padding: 12px 24px;
        }
        .brand-logo {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--emerald-deep);
            letter-spacing: -0.02em;
            text-decoration: none;
        }
        
        .nav-avatar-mini {
            width: 40px; height: 40px;
            background: var(--emerald-tint);
            color: var(--emerald-deep);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 1.1rem;
            transition: transform 0.2s ease;
        }
        .nav-avatar-mini:hover { transform: translateY(-1px); }
        .dropdown-toggle::after { display: none; }

        .offcanvas-custom { border-right: 1px solid var(--rule); }
        .sidebar-link {
            color: var(--ink); font-weight: 600;
            transition: all 0.2s ease;
            border-radius: 12px; margin: 4px 16px;
        }
        .sidebar-link:hover { background: var(--emerald-tint); color: var(--emerald-deep); }

        /* --- Security Page Specifics --- */
        .page-wrap { max-width: 540px; margin: 0 auto; padding: 48px 24px 80px; }

        .back-link {
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; color: var(--muted);
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 32px; transition: color 0.2s ease;
            text-transform: uppercase;
        }
        .back-link:hover { color: var(--emerald-deep); }

        .card-security {
            background: var(--paper); border-radius: 24px;
            box-shadow: 0 1px 3px rgba(15,42,31,0.05), 0 24px 56px -20px rgba(15,42,31,0.14);
            position: relative; overflow: hidden;
            padding: 48px 40px;
        }
        .card-security::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--emerald) 0%, #4fa87f 60%, var(--emerald) 100%);
        }

        /* Header Section */
        .icon-wrapper {
            width: 64px;
            height: 64px;
            background: var(--ink);
            color: #fff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 16px rgba(15,42,31,0.1);
        }

        h2.title {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--ink);
            text-align: center;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.5;
            text-align: center;
            margin-bottom: 40px;
        }

        /* Specialized PIN/OTP Inputs */
        .field-group { margin-bottom: 28px; }
        
        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .field-label {
            font-size: 0.7rem; font-weight: 700; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.12em;
            margin: 0;
        }

        .send-otp-link {
            font-size: 0.75rem; font-weight: 700; color: var(--emerald-deep);
            text-decoration: none; transition: color 0.2s ease;
        }
        .send-otp-link:hover { color: var(--ink); text-decoration: underline; }

        .secure-input {
            width: 100%;
            background: #fbfcfb;
            border: 2px solid var(--rule);
            border-radius: 16px;
            padding: 16px;
            font-size: 2rem;
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            color: var(--ink);
            text-align: center;
            letter-spacing: 0.4em;
            padding-left: calc(16px + 0.4em);
            transition: all 0.2s ease;
        }
        .secure-input:focus {
            outline: none;
            background: var(--paper);
            border-color: var(--emerald);
            box-shadow: 0 0 0 4px rgba(15, 122, 76, 0.1);
        }
        .secure-input::placeholder { 
            color: #d3d9d5; 
            letter-spacing: normal;
            font-weight: 500;
            font-size: 1.2rem;
            transform: translateY(-4px);
            display: inline-block;
        }

        .btn-confirm {
            width: 100%;
            background: var(--ink);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.01em;
            margin-top: 12px;
            transition: background 0.25s ease, transform 0.15s ease;
        }
        .btn-confirm:hover { background: var(--emerald-deep); transform: translateY(-1px); }
        .btn-confirm:active { transform: translateY(0); }
    </style>
</head>
<body>
    <!-- PREMIUM NAVBAR -->
    <nav class="navbar navbar-custom sticky-top">
        <div class="container-fluid max-w-lg d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
                <button class="btn p-0 border-0 text-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-list" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/></svg>
                </button>
                <a class="brand-logo" href="/dashboard">PayWallet</a>
            </div>
            
            <div class="dropdown">
                <a href="#" class="dropdown-toggle text-decoration-none" data-bs-toggle="dropdown">
                    <div class="nav-avatar-mini shadow-sm">
                        <span th:text="${user.name != null ? #strings.substring(user.name, 0, 1).toUpperCase() : 'U'}">U</span>
                    </div>
                </a>
            </div>
        </div>
    </nav>

    <!-- PREMIUM SIDEBAR -->
    <div class="offcanvas offcanvas-start offcanvas-custom" tabindex="-1" id="sidebarMenu" style="width: 280px; background: var(--paper);">
        <div class="offcanvas-header border-bottom px-4 py-4">
            <h5 class="brand-logo mb-0">PayWallet Hub</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0 py-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a href="/dashboard" class="nav-link sidebar-link px-4 py-3">
                        <i class="bi bi-house-door me-3 fs-5 align-middle"></i> Dashboard
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="page-wrap">
        <a href="/dashboard" class="back-link">&larr; BACK TO DASHBOARD</a>
        
        <div class="card-security">
            
            <div class="icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-shield-lock-fill" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M8 0c-.69 0-1.843.265-2.928.56-1.11.3-2.229.655-2.887.87a1.54 1.54 0 0 0-1.044 1.262c-.596 4.477.787 7.795 2.465 9.99a11.777 11.777 0 0 0 2.517 2.453c.386.273.744.482 1.048.625.28.132.581.24.829.24s.548-.108.829-.24a7.159 7.159 0 0 0 1.048-.625 11.775 11.775 0 0 0 2.517-2.453c1.678-2.195 3.061-5.513 2.465-9.99a1.541 1.541 0 0 0-1.044-1.263 62.467 62.467 0 0 0-2.887-.87C9.843.266 8.69 0 8 0zm0 5a1.5 1.5 0 0 1 .5 2.915l.385 1.99a.5.5 0 0 1-.491.595h-.788a.5.5 0 0 1-.49-.595l.384-1.99A1.5 1.5 0 0 1 8 5z"/>
                </svg>
            </div>
            
            <h2 class="title">Change Security PIN</h2>
            <p class="subtitle">Please verify your identity with an OTP before setting a new 4-digit MPIN for your wallet transactions.</p>
            
            <form th:action="@{/dashboard/change-pin}" method="POST">
                
                <div class="field-group">
                    <div class="label-row">
                        <label class="field-label">New 4-Digit PIN</label>
                    </div>
                    <input type="password" class="secure-input" name="newPin" maxlength="4" placeholder="••••" required>
                </div>
                
                <div class="field-group">
                    <div class="label-row">
                        <label class="field-label">SMS OTP Verification</label>
                        <a href="#" class="send-otp-link">Send OTP</a>
                    </div>
                    <input type="text" class="secure-input" style="letter-spacing: 0.3em; padding-left: calc(16px + 0.3em);" name="otp" maxlength="6" placeholder="------" required>
                </div>
                
                <button type="submit" class="btn-confirm">Verify & Update PIN</button>
            </form>

        </div>
    </div>
    
    <!-- Add this right above </body> -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sendOtpBtn = document.querySelector('.send-otp-link');
            
            sendOtpBtn.addEventListener('click', function(e) {
                e.preventDefault(); // Stop the link from jumping to the top of the page
                
                const originalText = sendOtpBtn.innerText;
                sendOtpBtn.innerText = "Sending...";
                sendOtpBtn.style.pointerEvents = "none"; // Prevent double-clicking
                sendOtpBtn.style.color = "#7c877f"; // Make it look disabled

                // Call the Java backend
                fetch('/dashboard/send-pin-otp', { method: 'POST' })
                    .then(response => response.json())
                    .then(data => {
                        if(data.success) {
                            
                            sendOtpBtn.innerText = "Sent!";
                        } else {
                            
                            sendOtpBtn.innerText = originalText;
                            sendOtpBtn.style.pointerEvents = "auto";
                            sendOtpBtn.style.color = "var(--emerald-deep)";
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert("Network error. Could not connect to server.");
                        sendOtpBtn.innerText = originalText;
                        sendOtpBtn.style.pointerEvents = "auto";
                        sendOtpBtn.style.color = "var(--emerald-deep)";
                    });
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
