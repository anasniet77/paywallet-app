<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Verify Identity - PayWallet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ink: #0f2a1f;
            --paper: #ffffff;
            --rule: #e6e9e7;
            --emerald: #0f7a4c;
            --emerald-deep: #0b5c3a;
            --emerald-tint: #eaf5ef;
            --muted: #7c877f;
            --danger: #d93025;
            --danger-tint: #fce8e6;
        }

        * { box-sizing: border-box; }

        body {
            background: #f8faf9;
            font-family: 'Inter', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .card-auth {
            background: var(--paper);
            border-radius: 24px;
            padding: 48px 36px;
            box-shadow: 0 1px 3px rgba(15,42,31,0.05), 0 24px 56px -20px rgba(15,42,31,0.14);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .card-auth::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--emerald) 0%, #4fa87f 60%, var(--emerald) 100%);
        }

        /* Distinctive Security Icon Header */
        .icon-wrapper {
            width: 64px;
            height: 64px;
            background: var(--emerald-tint);
            color: var(--emerald-deep);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        h2.title {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--ink);
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 32px;
            padding: 0 10px;
        }

        .alert-custom {
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 24px;
            border: none;
            background: var(--danger-tint);
            color: #a51d14;
        }

        /* Specialized OTP Input Field */
        .otp-input {
            width: 100%;
            background: #fbfcfb;
            border: 2px solid var(--rule);
            border-radius: 16px;
            padding: 16px;
            font-size: 2rem;
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            color: var(--ink);
            text-align: center;
            letter-spacing: 0.4em; /* Spaces out the numbers */
            padding-left: calc(16px + 0.4em); /* Offsets the letter spacing to keep it perfectly centered */
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }
        .otp-input:focus {
            outline: none;
            background: var(--paper);
            border-color: var(--emerald);
            box-shadow: 0 0 0 4px rgba(15, 122, 76, 0.1);
        }
        .otp-input::placeholder { 
            color: #d3d9d5; 
            letter-spacing: normal; /* Removes weird spacing on the placeholder text */
            font-weight: 500;
            font-size: 1.2rem;
            transform: translateY(-4px);
            display: inline-block;
        }

        .btn-auth {
            width: 100%;
            background: var(--emerald); /* Use emerald here to signify an 'approval' action */
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.01em;
            transition: background 0.25s ease, transform 0.15s ease;
        }
        .btn-auth:hover {
            background: var(--emerald-deep);
            transform: translateY(-1px);
        }
        .btn-auth:active { transform: translateY(0); }

    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="card-auth">
            
            <div class="icon-wrapper">
                <!-- SVG Padlock Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <h2 class="title">Verification Required</h2>
            <p class="subtitle">Enter the secure 6-digit code sent to your registered email and mobile device.</p>
            
            <!-- Dynamic Error Alert -->
            <div th:if="${error}" class="alert-custom" th:text="${error}"></div>
            
            <form th:action="@{/verify-otp}" method="post">
                
                <input type="text" name="otp" class="otp-input" placeholder="000000" maxlength="6" required autocomplete="one-time-code">
                
                <button type="submit" class="btn-auth">Verify Identity</button>
            </form>
            
        </div>
    </div>
</body>
</html>
